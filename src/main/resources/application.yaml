spring:
  application:
    name: user-api-mongodb-english
  data:
    mongodb:
      uri: mongodb://localhost:27017/local
      database: local
  datasource:
    url: jdbc:h2:file:./data/powerbank-movements;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console: # http://localhost:8080/h2-console/
      enabled: true
      path: /h2-console
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

server:
  port: 8080

user:
  updates:
    queue: user.updates.queue

movement:
  requests:
    queue: movement.requests.queue
